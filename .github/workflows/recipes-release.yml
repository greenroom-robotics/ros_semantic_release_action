name: release (DEPRECATED)

# DEPRECATED / REMOVED. This reusable workflow no longer functions — it fails
# immediately so any repo still on the old pixi/recipe release path is forced
# to migrate.
#
# Pixi-native and vendored recipe releases now go through `mise ci release`
# (greenroom-robotics/mise, .github/actions/release), which opens the recipes
# PR directly instead of firing a repository_dispatch. Replace:
#
#   uses: greenroom-robotics/ros_semantic_release_action/.github/workflows/recipes-release.yml@main
#
# with the mise release action — see the greenroom-robotics/mise README.
#
# Inputs are kept (all optional) only so a caller's `with:` block still parses
# and the caller reaches the deprecation error below rather than an input error.

on:
  workflow_call:
    inputs:
      package:
        type: string
        required: false
      package_path:
        type: string
        required: false
      manifest_type:
        type: string
        required: false
      recipes_repo:
        type: string
        required: false

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Fail with deprecation notice
        run: |
          echo "::error title=recipes-release.yml removed::This reusable workflow is deprecated and no longer functions. Pixi-native + vendored recipe releases now go through 'mise ci release' (greenroom-robotics/mise/.github/actions/release), which opens the recipes PR directly. Replace the recipes-release.yml@main reference with the mise release action — see the greenroom-robotics/mise README."
          exit 1
