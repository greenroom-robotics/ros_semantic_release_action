name: release
on:
  workflow_call:
    inputs:
      package:
        description: Bare ROS package name.
        type: string
        required: true
      package_path:
        description: Path from repo root to the dir containing the package's pixi.toml.
        type: string
        required: true
      recipes_repo:
        description: GitHub <owner>/<repo> of the recipes repo to dispatch.
        type: string
        default: greenroom-robotics/ros-recipes

jobs:
  release:
    runs-on: runs-on=${{ github.run_id }}/runner=1cpu-linux-x64
    permissions:
      contents: read
    env:
      PACKAGE: ${{ inputs.package }}
      PACKAGE_PATH: ${{ inputs.package_path }}
      RELEASE_TOOLING_DIR: _release_tooling
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
            ros-recipes

      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Checkout release-tooling
        uses: actions/checkout@v6
        with:
          repository: Greenroom-Robotics/ros_semantic_release_action
          path: ${{ env.RELEASE_TOOLING_DIR }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.RELEASE_TOOLING_DIR }}/package-lock.json

      - name: Install dependencies
        run: |
          npm --prefix "$RELEASE_TOOLING_DIR" ci
          pip install --quiet tomlkit

      - name: Configure git as App bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          USER_ID=$(gh api "/users/${SLUG}[bot]" --jq .id)
          git config --global user.name "${SLUG}[bot]"
          git config --global user.email "${USER_ID}+${SLUG}[bot]@users.noreply.github.com"

      - name: Configure git as App bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          USER_ID=$(gh api "/users/${SLUG}[bot]" --jq .id)
          git config --global user.name "${SLUG}[bot]"
          git config --global user.email "${USER_ID}+${SLUG}[bot]@users.noreply.github.com"

      # semantic-release-monorepo identifies the package by reading
      # package.json from cwd. Source repos use pixi.toml as their manifest
      # — stub a package.json inside the package dir at runtime. Never
      # committed (each source repo's caller workflow owns this dir).
      - name: Stub package.json for semantic-release-monorepo
        run: |
          if [ ! -f "$PACKAGE_PATH/package.json" ]; then
            printf '{"name":"%s","private":true}\n' "$PACKAGE" \
              > "$PACKAGE_PATH/package.json"
          fi

      - name: Run semantic-release
        working-directory: ${{ env.PACKAGE_PATH }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RECIPES_REPO: ${{ inputs.recipes_repo }}
        run: |
          npm --prefix "$GITHUB_WORKSPACE/$RELEASE_TOOLING_DIR" exec -- \
            semantic-release --extends "$GITHUB_WORKSPACE/$RELEASE_TOOLING_DIR/release.config.js"
