name: test
on:
  pull_request:
  push:
    branches: [main]

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Validate fixture payloads
        run: |
          set -euo pipefail
          # Valid fixtures must pass.
          npx -y ajv-cli@5 validate \
            -s dispatch-payload.schema.json \
            -d 'tests/dispatch-payloads/valid-*.json' \
            --spec=draft2020 --strict=false
          # Invalid fixtures must fail. We invert the exit code per file.
          for f in tests/dispatch-payloads/invalid-*.json; do
            if npx -y ajv-cli@5 validate -s dispatch-payload.schema.json \
                -d "$f" --spec=draft2020 --strict=false 2>/dev/null; then
              echo "FAIL: $f was expected to be invalid but validated"
              exit 1
            else
              echo "OK: $f rejected as expected"
            fi
          done
