name: release
on:
  workflow_call:
    inputs:
      package:
        description: Bare ROS package name.
        type: string
        required: true
      package_path:
        description: Path from repo root to the dir containing the package's pixi.toml.
        type: string
        required: true
      recipes_repo:
        description: GitHub <owner>/<repo> of the recipes repo to dispatch.
        type: string
        default: Greenroom-Robotics/ros-recipes

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          # Token must be valid for both source repo (push) and recipes repo (dispatch).
          # Multi-line newline-separated list.
          repositories: |
            ${{ github.event.repository.name }}
            ros-recipes

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Show inputs (debug)
        run: |
          echo "package=${{ inputs.package }}"
          echo "package_path=${{ inputs.package_path }}"
          echo "recipes_repo=${{ inputs.recipes_repo }}"
          test -f "${{ inputs.package_path }}/pixi.toml" \
            || { echo "::error::pixi.toml not found at ${{ inputs.package_path }}"; exit 1; }
